{% extends "base.html" %}

{% block title %}Sign Up | Learn About Nature{% endblock %}

{% block content %}
  <section class="auth-shell">
    <div class="auth-card">
      <h2>Sign Up</h2>
      <p>Create your account first, then you will go to the home page.</p>
      <form method="post" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Create Account</button>
      </form>
      <p class="auth-note">Already have an account? <a href="{% url 'login' %}">Login</a></p>
    </div>
  </section>
{% endblock %}
