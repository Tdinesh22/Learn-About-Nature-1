{% extends "base.html" %}

{% block title %}Login | Learn About Nature{% endblock %}

{% block content %}
  <section class="auth-shell">
    <div class="auth-card">
      <h2>Login</h2>
      <p>Login first, then you will go to the home page.</p>
      <form method="post" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Login</button>
      </form>
      <p class="auth-note">No account yet? <a href="{% url 'signup' %}">Create one</a></p>
    </div>
  </section>
{% endblock %}
